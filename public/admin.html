<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel7teen Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 120px auto;
            padding: 3rem;
            background: var(--pure-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(128, 0, 0, 0.1);
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            color: var(--primary-charcoal);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            padding: 1rem;
            border: 2px solid rgba(128, 0, 0, 0.1);
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: var(--soft-bone);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-burgundy);
            box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1);
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: var(--primary-burgundy);
            color: var(--pure-white);
            box-shadow: 0 4px 6px rgba(128, 0, 0, 0.2);
        }
        
        .btn-primary:hover {
            background: var(--dark-burgundy);
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(128, 0, 0, 0.3);
        }
        
        .btn-secondary {
            background: var(--text-light);
            color: var(--pure-white);
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .dashboard {
            display: none;
            padding: 3rem 0;
            background: var(--soft-bone);
            min-height: 100vh;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(128, 0, 0, 0.1);
        }
        
        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-charcoal);
            text-transform: none;
            letter-spacing: normal;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .error-message {
            color: var(--pure-white);
            background: linear-gradient(135deg, #dc3545, #c82333);
            border: 1px solid #f5c6cb;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
        }
        
        .success-message {
            color: var(--pure-white);
            background: linear-gradient(135deg, #28a745, #20c997);
            border: 1px solid #c3e6cb;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
        }
        
        .dashboard-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .dashboard-card {
            background: var(--pure-white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(128, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .dashboard-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
        }
        
        .dashboard-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-charcoal);
            margin-bottom: 1.5rem;
            text-transform: none;
            letter-spacing: normal;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--pure-white), var(--soft-bone));
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(128, 0, 0, 0.1);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-burgundy);
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: var(--text-light);
            margin-top: 0.5rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
        }

        /* Room Grid Styles */
        .room-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
        }

        .filter-btn:hover {
            background: #f8f9fa;
        }

        .filter-btn:hover {
            background: var(--soft-bone);
        }

        .filter-btn.active {
            background: var(--primary-burgundy);
            color: var(--pure-white);
            border-color: var(--primary-burgundy);
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .room-card {
            background: var(--pure-white);
            border: 2px solid rgba(128, 0, 0, 0.1);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .room-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .room-card.available {
            border-color: #28a745;
            background: linear-gradient(135deg, #f8fff9 0%, #e8f5e8 100%);
        }

        .room-card.occupied {
            border-color: #dc3545;
            background: linear-gradient(135deg, #fff8f8 0%, #ffe8e8 100%);
        }

        .room-card.maintenance {
            border-color: #ffc107;
            background: linear-gradient(135deg, #fffef8 0%, #fff8e8 100%);
        }

        .room-card.reserved {
            border-color: #17a2b8;
            background: linear-gradient(135deg, #f8ffff 0%, #e8f8f8 100%);
        }

        .room-card.dirty {
            border-color: #6c757d;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8e9ea 100%);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .room-number {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-charcoal);
            font-family: 'Montserrat', sans-serif;
        }

        .room-status {
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--pure-white);
            font-family: 'Montserrat', sans-serif;
        }

        .room-status.available {
            background: #28a745;
        }

        .room-status.occupied {
            background: #dc3545;
        }

        .room-status.maintenance {
            background: #ffc107;
            color: var(--primary-charcoal);
        }

        .room-status.reserved {
            background: #17a2b8;
        }

        .room-status.dirty {
            background: #6c757d;
        }

        .room-details {
            font-size: 0.875rem;
            color: var(--text-light);
            line-height: 1.4;
            font-family: 'Montserrat', sans-serif;
        }

        .room-type {
            font-weight: 600;
            color: var(--primary-charcoal);
            margin-bottom: 0.25rem;
        }

        .room-price {
            color: var(--primary-burgundy);
            font-weight: 600;
        }

        .room-guest {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .room-floor {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(128, 0, 0, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--pure-white);
        }

        .room-card.available {
            border-color: #28a745;
            background: linear-gradient(135deg, #f8fff9 0%, #e8f5e8 100%);
        }

        .room-card.occupied {
            border-color: #dc3545;
            background: linear-gradient(135deg, #fff8f8 0%, #ffe8e8 100%);
        }

        .room-card.maintenance {
            border-color: #ffc107;
            background: linear-gradient(135deg, #fffef8 0%, #fff8e8 100%);
        }

        .room-card.reserved {
            border-color: #17a2b8;
            background: linear-gradient(135deg, #f8ffff 0%, #e8f8f8 100%);
        }

        .room-card.dirty {
            border-color: #6c757d;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8e9ea 100%);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .room-number {
            font-size: 1.25rem;
            font-weight: bold;
            color: #333;
        }

        .room-status {
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: white;
        }

        .room-status.available {
            background: #28a745;
        }

        .room-status.occupied {
            background: #dc3545;
        }

        .room-status.maintenance {
            background: #ffc107;
            color: #333;
        }

        .room-status.reserved {
            background: #17a2b8;
        }

        .room-status.dirty {
            background: #6c757d;
        }

        .room-details {
            font-size: 0.875rem;
            color: #666;
            line-height: 1.4;
        }

        .room-type {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.25rem;
        }

        .room-price {
            color: #007bff;
            font-weight: 600;
        }

        .room-guest {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 0.8rem;
            color: #666;
        }

        .room-floor {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .rooms-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .room-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginContainer" class="auth-container">
        <h2>Admin Login</h2>
        <div id="messageContainer"></div>
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="dashboard-header">
            <h1>Hotel7teen Admin Dashboard</h1>
            <div class="user-info">
                <span id="userDisplay"></span>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalRooms">-</div>
                <div class="stat-label">Total Rooms</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="availableRooms">-</div>
                <div class="stat-label">Available Rooms</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayArrivals">-</div>
                <div class="stat-label">Today's Arrivals</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="occupiedRooms">-</div>
                <div class="stat-label">Occupied Rooms</div>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="dashboard-card">
                <h3>Room Status Grid</h3>
                <div class="room-controls">
                    <button id="refreshRooms" class="btn btn-primary">Refresh Status</button>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All Rooms</button>
                        <button class="filter-btn" data-filter="available">Available</button>
                        <button class="filter-btn" data-filter="occupied">Occupied</button>
                        <button class="filter-btn" data-filter="maintenance">Maintenance</button>
                    </div>
                </div>
                <div id="roomsGrid" class="rooms-grid"></div>
            </div>
            <div class="dashboard-card">
                <h3>Today's Arrivals</h3>
                <div id="arrivalsList"></div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentUser = null;
        let accessToken = localStorage.getItem('hotel7teen_token');

        // API base URL
        const API_BASE = 'http://localhost:3000/api';

        // DOM elements
        const loginContainer = document.getElementById('loginContainer');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('loginForm');
        const logoutBtn = document.getElementById('logoutBtn');
        const messageContainer = document.getElementById('messageContainer');
        const userDisplay = document.getElementById('userDisplay');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (accessToken) {
                verifyToken();
            } else {
                showLogin();
            }
        });

        // Event listeners
        loginForm.addEventListener('submit', handleLogin);
        logoutBtn.addEventListener('click', handleLogout);
        
        // Room grid event listeners
        document.getElementById('refreshRooms').addEventListener('click', refreshRooms);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', handleFilterClick);
        });

        // Functions
        function showMessage(message, type = 'error') {
            messageContainer.innerHTML = `
                <div class="${type}-message">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                messageContainer.innerHTML = '';
            }, 5000);
        }

        function showLogin() {
            loginContainer.style.display = 'block';
            dashboard.style.display = 'none';
        }

        function showDashboard() {
            loginContainer.style.display = 'none';
            dashboard.style.display = 'block';
            userDisplay.textContent = `${currentUser.first_name} ${currentUser.last_name} (${currentUser.position})`;
            loadDashboardData();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const formData = new FormData(loginForm);
            const email = formData.get('email');
            const password = formData.get('password');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                currentUser = data.user;
                accessToken = data.session.access_token;
                localStorage.setItem('hotel7teen_token', accessToken);
                
                showMessage('Login successful!', 'success');
                setTimeout(() => {
                    showDashboard();
                }, 1000);

            } catch (error) {
                showMessage(error.message);
            }
        }

        async function handleLogout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    }
                });
            } catch (error) {
                console.error('Logout error:', error);
            }

            currentUser = null;
            accessToken = null;
            localStorage.removeItem('hotel7teen_token');
            showLogin();
            showMessage('Logged out successfully', 'success');
        }

        async function verifyToken() {
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error('Token verification failed');
                }

                const data = await response.json();
                currentUser = data.user;
                showDashboard();

            } catch (error) {
                console.error('Token verification error:', error);
                localStorage.removeItem('hotel7teen_token');
                accessToken = null;
                showLogin();
            }
        }

        async function loadDashboardData() {
            try {
                // Load rooms data
                const roomsResponse = await fetch(`${API_BASE}/management/rooms`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    }
                });

                if (roomsResponse.ok) {
                    const roomsData = await roomsResponse.json();
                    // Store rooms data for click handler
                    localStorage.setItem('currentRooms', JSON.stringify(roomsData.rooms));
                    updateRoomStats(roomsData.rooms);
                    displayRooms(roomsData.rooms);
                }

                // Load arrivals data
                const arrivalsResponse = await fetch(`${API_BASE}/management/arrivals/`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    }
                });

                if (arrivalsResponse.ok) {
                    const arrivalsData = await arrivalsResponse.json();
                    updateArrivalsStats(arrivalsData);
                    displayArrivals(arrivalsData.arrivals);
                }

            } catch (error) {
                console.error('Error loading dashboard data:', error);
                showMessage('Error loading dashboard data');
            }
        }

        function updateRoomStats(rooms) {
            const totalRooms = rooms.length;
            const availableRooms = rooms.filter(room => room.status === 'Available').length;
            const occupiedRooms = rooms.filter(room => room.status === 'Occupied').length;

            document.getElementById('totalRooms').textContent = totalRooms;
            document.getElementById('availableRooms').textContent = availableRooms;
            document.getElementById('occupiedRooms').textContent = occupiedRooms;
        }

        function updateArrivalsStats(arrivalsData) {
            document.getElementById('todayArrivals').textContent = arrivalsData.total_arrivals;
        }

        function displayRooms(rooms) {
            const roomsGrid = document.getElementById('roomsGrid');
            const currentFilter = document.querySelector('.filter-btn.active').dataset.filter;
            
            const filteredRooms = currentFilter === 'all' 
                ? rooms 
                : rooms.filter(room => room.status.toLowerCase() === currentFilter);
            
            roomsGrid.innerHTML = filteredRooms.map(room => `
                <div class="room-card ${room.status.toLowerCase()}" data-room-id="${room.id}">
                    <div class="room-floor">Floor ${room.floor_number}</div>
                    <div class="room-header">
                        <div class="room-number">${room.room_number}</div>
                        <div class="room-status ${room.status.toLowerCase()}">${room.status}</div>
                    </div>
                    <div class="room-details">
                        <div class="room-type">${room.room_type}</div>
                        <div class="room-price">$${room.price_per_night}/night</div>
                        <div>Capacity: ${room.capacity} guests</div>
                        ${room.current_booking ? `
                            <div class="room-guest">
                                <strong>Guest:</strong> ${room.current_booking.guest_name}<br>
                                <strong>Until:</strong> ${new Date(room.current_booking.check_out_date).toLocaleDateString()}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
            // Add click handlers for room cards
            document.querySelectorAll('.room-card').forEach(card => {
                card.addEventListener('click', () => handleRoomClick(card.dataset.roomId));
            });
        }

        function displayArrivals(arrivals) {
            const arrivalsList = document.getElementById('arrivalsList');
            if (arrivals.length === 0) {
                arrivalsList.innerHTML = '<p>No arrivals today</p>';
                return;
            }

            arrivalsList.innerHTML = arrivals.map(arrival => `
                <div style="padding: 0.5rem; border-bottom: 1px solid #eee;">
                    <strong>${arrival.guest_name}</strong><br>
                    Room ${arrival.room.number} (${arrival.room.type})<br>
                    Guests: ${arrival.number_of_guests}
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = {
                'Available': '#28a745',
                'Occupied': '#dc3545',
                'Maintenance': '#ffc107',
                'Reserved': '#17a2b8',
                'Dirty': '#6c757d'
            };
            return colors[status] || '#333';
        }

        // Room grid functions
        function handleFilterClick(e) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            e.target.classList.add('active');
            
            // Re-display rooms with new filter
            loadDashboardData();
        }

        async function refreshRooms() {
            const refreshBtn = document.getElementById('refreshRooms');
            refreshBtn.disabled = true;
            refreshBtn.textContent = 'Refreshing...';
            
            try {
                await loadDashboardData();
                showMessage('Room status refreshed successfully', 'success');
            } catch (error) {
                showMessage('Error refreshing room status');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Refresh Status';
            }
        }

        function handleRoomClick(roomId) {
            // Show room details modal or navigate to room details
            // For now, just show a simple alert with room info
            const rooms = JSON.parse(localStorage.getItem('currentRooms') || '[]');
            const room = rooms.find(r => r.id === roomId);
            
            if (room) {
                const message = `
                    Room ${room.room_number}
                    Type: ${room.room_type}
                    Status: ${room.status}
                    Price: $${room.price_per_night}/night
                    Capacity: ${room.capacity} guests
                    Floor: ${room.floor_number}
                    ${room.current_booking ? `Guest: ${room.current_booking.guest_name}` : ''}
                `;
                alert(message.trim());
            }
        }

        // Auto-refresh functionality
        let autoRefreshInterval = null;

        function startAutoRefresh() {
            // Refresh every 30 seconds
            autoRefreshInterval = setInterval(async () => {
                try {
                    await loadDashboardData();
                    console.log('Dashboard auto-refreshed');
                } catch (error) {
                    console.error('Auto-refresh error:', error);
                }
            }, 30000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        // Update showDashboard to start auto-refresh
        const originalShowDashboard = showDashboard;
        showDashboard = function() {
            originalShowDashboard();
            startAutoRefresh();
        };

        // Update handleLogout to stop auto-refresh
        const originalHandleLogout = handleLogout;
        handleLogout = async function() {
            stopAutoRefresh();
            await originalHandleLogout();
        };
    </script>
</body>
</html>
