<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - Hotel7teen</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .booking-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #800000 100%);
            padding: 2rem 1rem;
        }

        .booking-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .booking-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary-burgundy);
            margin-bottom: 1rem;
        }

        .booking-header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            color: #cccccc;
        }

        .booking-form-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .progress-bar {
            display: flex;
            background: #f8f9fa;
            padding: 2rem;
            border-bottom: 1px solid #e9ecef;
        }

        .progress-step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .progress-step::after {
            content: '';
            position: absolute;
            top: 20px;
            right: -50%;
            width: 100%;
            height: 2px;
            background: #e9ecef;
            z-index: 1;
        }

        .progress-step:last-child::after {
            display: none;
        }

        .progress-step.active::after {
            background: var(--primary-burgundy);
        }

        .progress-step.completed::after {
            background: #28a745;
        }

        .progress-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e9ecef;
            margin: 0 auto 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            position: relative;
            z-index: 2;
        }

        .progress-step.active .progress-circle {
            background: var(--primary-burgundy);
            color: white;
        }

        .progress-step.completed .progress-circle {
            background: #28a745;
            color: white;
        }

        .progress-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: #6c757d;
        }

        .progress-step.active .progress-label,
        .progress-step.completed .progress-label {
            color: #212529;
            font-weight: 500;
        }

        .form-steps {
            padding: 2rem;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            color: #212529;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-burgundy);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .room-cards {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .room-card {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .room-card:hover {
            border-color: var(--primary-burgundy);
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.1);
        }

        .room-card.selected {
            border-color: var(--primary-burgundy);
            background: rgba(128, 0, 0, 0.1);
        }

        .room-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .room-type {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #212529;
        }

        .room-price {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-burgundy);
        }

        .room-details {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .room-amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .amenity-tag {
            background: #f8f9fa;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #6c757d;
        }

        .booking-summary {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .summary-row.total {
            font-weight: 600;
            font-size: 1.1rem;
            border-top: 2px solid var(--primary-burgundy);
            padding-top: 0.5rem;
            margin-top: 1rem;
        }

        .form-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 2rem;
            border-top: 1px solid #e9ecef;
        }

        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-burgundy);
            color: white;
        }

        .btn-primary:hover {
            background: var(--dark-burgundy);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-burgundy);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .progress-step {
                font-size: 0.8rem;
            }

            .progress-label {
                font-size: 0.7rem;
            }

            .booking-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="contact-header">
        <div class="container">
            <div class="contact-info-bar">
                <div class="contact-left">
                    <span>📞 08064492295 | 08097002925</span>
                </div>
                <div class="contact-right">
                    <span>✉️ info@hotel17teen.com</span>
                </div>
            </div>
        </div>
    </div>
    <div class="booking-container">
        <div class="booking-header">
            <h1>Book Your Stay</h1>
            <p>Experience luxury at its finest</p>
        </div>

        <div class="booking-form-container">
            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-step active" data-step="1">
                    <div class="progress-circle">1</div>
                    <div class="progress-label">Dates</div>
                </div>
                <div class="progress-step" data-step="2">
                    <div class="progress-circle">2</div>
                    <div class="progress-label">Rooms</div>
                </div>
                <div class="progress-step" data-step="3">
                    <div class="progress-circle">3</div>
                    <div class="progress-label">Details</div>
                </div>
            </div>

            <!-- Form Steps -->
            <div class="form-steps">
                <!-- Step 1: Date Selection -->
                <div class="form-step active" id="step1">
                    <h2>Select Your Dates</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="checkIn">Check-in Date</label>
                            <input type="date" id="checkIn" required>
                        </div>
                        <div class="form-group">
                            <label for="checkOut">Check-out Date</label>
                            <input type="date" id="checkOut" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="roomType">Room Type Preference (Optional)</label>
                        <select id="roomType">
                            <option value="">All Room Types</option>
                            <option value="presidential">Presidential Suite</option>
                            <option value="crystal">Crystal Suite</option>
                            <option value="superior">Superior Double</option>
                            <option value="executive">Executive Double</option>
                            <option value="luxury">Luxury Suite</option>
                            <option value="studio">Studio Room</option>
                        </select>
                    </div>
                </div>

                <!-- Step 2: Room Selection -->
                <div class="form-step" id="step2">
                    <h2>Available Rooms</h2>
                    <div id="roomsLoading" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <p>Finding available rooms...</p>
                    </div>
                    <div id="roomsContainer" class="room-cards"></div>
                    <div id="noRooms" style="display: none;" class="error-message">
                        No rooms available for the selected dates. Please try different dates.
                    </div>
                </div>

                <!-- Step 3: Guest Information -->
                <div class="form-step" id="step3">
                    <h2>Guest Information</h2>
                    
                    <div class="booking-summary" id="bookingSummary">
                        <!-- Booking summary will be populated here -->
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="guests">Number of Guests</label>
                        <select id="guests" required>
                            <option value="">Select number of guests</option>
                            <option value="1">1 Guest</option>
                            <option value="2">2 Guests</option>
                            <option value="3">3 Guests</option>
                            <option value="4">4 Guests</option>
                            <option value="5">5 Guests</option>
                            <option value="6">6 Guests</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="specialRequests">Special Requests (Optional)</label>
                        <textarea id="specialRequests" rows="4" placeholder="Any special requests or preferences..."></textarea>
                    </div>
                </div>

                <!-- Form Navigation -->
                <div class="form-navigation">
                    <button type="button" class="btn btn-secondary" id="prevBtn" style="display: none;">Previous</button>
                    <button type="button" class="btn btn-primary" id="nextBtn">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script src="booking.js"></script>
</body>
</html>
