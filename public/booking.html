<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - Hotel7teen</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>
    <div class="booking-container">
        <div class="booking-header">
            <h1>Book Your Stay</h1>
            <p>Experience luxury at its finest</p>
        </div>

        <div class="booking-form-container">
            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-step active" data-step="1">
                    <div class="progress-circle">1</div>
                    <div class="progress-label">Dates</div>
                </div>
                <div class="progress-step" data-step="2">
                    <div class="progress-circle">2</div>
                    <div class="progress-label">Rooms</div>
                </div>
                <div class="progress-step" data-step="3">
                    <div class="progress-circle">3</div>
                    <div class="progress-label">Details</div>
                </div>
            </div>

            <!-- Form Steps -->
            <div class="form-steps">
                <!-- Step 1: Date Selection -->
                <div class="form-step active" id="step1">
                    <h2>Select Your Dates</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="checkIn">Check-in Date</label>
                            <input type="date" id="checkIn" required>
                        </div>
                        <div class="form-group">
                            <label for="checkOut">Check-out Date</label>
                            <input type="date" id="checkOut" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="roomType">Room Type Preference (Optional)</label>
                        <select id="roomType">
                            <option value="">All Room Types</option>
                            <option value="presidential">Presidential Suite</option>
                            <option value="crystal">Crystal Suite</option>
                            <option value="superior">Superior Double</option>
                            <option value="executive">Executive Double</option>
                            <option value="luxury">Luxury Suite</option>
                            <option value="studio">Studio Room</option>
                        </select>
                    </div>
                </div>

                <!-- Step 2: Room Selection -->
                <div class="form-step" id="step2">
                    <h2>Available Rooms</h2>
                    <div id="roomsLoading" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <p>Finding available rooms...</p>
                    </div>
                    <div id="roomsContainer" class="room-cards"></div>
                    <div id="noRooms" style="display: none;" class="error-message">
                        No rooms available for the selected dates. Please try different dates.
                    </div>
                </div>

                <!-- Step 3: Guest Information -->
                <div class="form-step" id="step3">
                    <h2>Guest Information</h2>
                    
                    <div class="booking-summary" id="bookingSummary">
                        <!-- Booking summary will be populated here -->
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="guests">Number of Guests</label>
                        <select id="guests" required>
                            <option value="">Select number of guests</option>
                            <option value="1">1 Guest</option>
                            <option value="2">2 Guests</option>
                            <option value="3">3 Guests</option>
                            <option value="4">4 Guests</option>
                            <option value="5">5 Guests</option>
                            <option value="6">6 Guests</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="specialRequests">Special Requests (Optional)</label>
                        <textarea id="specialRequests" rows="4" placeholder="Any special requests or preferences..."></textarea>
                    </div>
                </div>

                <!-- Form Navigation -->
                <div class="form-navigation">
                    <button type="button" class="btn btn-secondary" id="prevBtn" style="display: none;">Previous</button>
                    <button type="button" class="btn btn-primary" id="nextBtn">Next</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script type="module">
        import { createHeader, initializeHeader } from './components/header.js';
        import { createFooter, initializeFooter } from './components/footer.js';
        
        // Inject header and footer
        document.getElementById('header-container').innerHTML = createHeader();
        document.getElementById('footer-container').innerHTML = createFooter();
        
        // Initialize components
        initializeHeader();
        initializeFooter();
    </script>
    <script src="script.js"></script>
    <script src="booking.js"></script>
</body>
</html>
