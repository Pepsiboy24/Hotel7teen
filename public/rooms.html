<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Accommodations - Hotel7teen</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>

    <main>
        <section class="hero-section">
            <div class="hero-background">
                <img src="https://images.unsplash.com/photo-1611892440504-42a792e24d32?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80" alt="Luxury Hotel Interior" class="hero-image">
                <div class="hero-overlay"></div>
            </div>
            
            <div class="container hero-content">
                <div class="hero-text">
                    <h2>Our Accommodations</h2>
                    <p>Experience unparalleled luxury in our exquisite collection of suites</p>
                    
                    <div class="hero-cta">
                        <a href="booking.html" class="cta-button primary">Book Now</a>
                        <button class="cta-button secondary">Virtual Tour</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="rooms" class="rooms-section">
            <div class="container">
                <div class="section-header">
                    <h2>Exquisite Accommodations</h2>
                    <p>Choose from our collection of luxury suites</p>
                </div>
                <div class="rooms-grid">
                    <!-- Room cards will be dynamically loaded here -->
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script type="module">
        import { createHeader, initializeHeader } from './components/header.js';
        import { createFooter, initializeFooter } from './components/footer.js';
        
        // Inject header and footer
        document.getElementById('header-container').innerHTML = createHeader();
        document.getElementById('footer-container').innerHTML = createFooter();
        
        // Initialize components
        initializeHeader();
        initializeFooter();
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
